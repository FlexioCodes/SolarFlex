name: Update movies index

on:
  push:
    paths:
      - "movies/**"
      - "tools/generate-movie-index.mjs"
      - ".github/workflows/update-movies-index.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate movies/index.json
        run: node tools/generate-movie-index.mjs

      - name: Commit changes (if any)
        run: |
          if git diff --quiet -- movies/index.json; then
            echo "No changes in movies/index.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add movies/index.json
          git commit -m "chore: auto-update movies index"
          git push
